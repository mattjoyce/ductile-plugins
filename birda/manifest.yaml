manifest_spec: ductile.plugin
manifest_version: 1
name: birda
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Run birda GPU-accelerated BirdNET bird detection on a WAV file via Docker. Accepts a native Unraid path, returns detections and performance metrics."
concurrency_safe: false
commands:
  - name: handle
    type: write
    description: "Analyze a WAV file for bird species using birda (BirdNET v24, ONNX/CUDA). Returns output_path, detections, duration_s, realtime_factor."
    idempotent: false
    retry_safe: false
    input_schema:
      wav_path: string
      lat: number
      lon: number
      min_conf: number
      week: integer
    output_schema:
      output_path: string
      detections: array
      duration_s: number
      realtime_factor: number
      detection_count: integer
    values:
      consume:
        - payload.wav_path
        - payload.lat
        - payload.lon
        - payload.min_conf
        - payload.week
  - name: health
    type: read
    description: "Check docker binary is accessible and birda image exists."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional:
    - docker_bin
    - default_min_conf
    - vram_min_free_mb
    - vram_wait_timeout_s
