manifest_spec: ductile.plugin
manifest_version: 1
name: hibp_radar
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Monitor configured email identities and owned domains for new appearances in HIBP breach dumps. Emits deltas only."
concurrency_safe: false
commands:
  - name: poll
    type: write
    description: "Query HIBP breachedaccount for each identity and breachedomain for each verified domain. Emit hibp.new_breach events for breach names not previously seen."
    idempotent: false
    retry_safe: true
  - name: handle
    type: write
    description: "Receive HIBP domain-subscription push webhook payload and emit hibp.new_breach events for the affected domain addresses."
    idempotent: true
    retry_safe: true
  - name: health
    type: read
    description: "Report per-surface readiness: API key validity (paid endpoints), configured identities, configured domains."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional:
    - hibp_api_key
    - user_agent_email
    - identities
    - domains
    - rate_limit_ms
    - timeout_seconds
