manifest_spec: ductile.plugin
manifest_version: 1
name: email_handler
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Final stage of the ductile email pipeline. Handles email.process_decision events with decision='process'. Fetches full body via gws, loads prompt template from configured path (kept out of repo), dispatches to claude -p for action. Claude decides reply / bd task / ignore."
commands:
  - name: handle
    type: write
    description: "Process a gmail.new_message event: fetch full body via gws, build prompt, dispatch to claude -p. Acts on result (reply, bd task, or ignore)."
    idempotent: false
    retry_safe: false
    values:
      consume:
        - payload.message_id
        - payload.from
        - payload.subject
        - payload.snippet
      emit: []
  - name: health
    type: read
    description: "Verify gws and claude binaries are reachable."
    idempotent: true
    retry_safe: true
config_keys:
  required:
    - prompt_template_path
  optional:
    - gws_binary
    - claude_binary
    - claude_working_dir
    - timeout_seconds
    - gws_fetch_timeout_seconds
