manifest_spec: ductile.plugin
manifest_version: 1
name: email_handler
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Handle incoming gmail.new_message events: fetch full body via gws, dispatch to PAI (claude -p) for action."
commands:
  - name: handle
    type: write
    description: "Process a gmail.new_message event: fetch full body via gws, build prompt, dispatch to claude -p. Acts on result (reply, bd task, or ignore)."
    idempotent: false
    retry_safe: false
    values:
      consume:
        - payload.message_id
        - payload.from
        - payload.subject
        - payload.snippet
      emit: []
  - name: health
    type: read
    description: "Verify gws and claude binaries are reachable."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional:
    - gws_binary
    - claude_binary
    - claude_working_dir
    - timeout_seconds
    - gws_fetch_timeout_seconds
