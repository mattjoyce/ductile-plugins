manifest_spec: ductile.plugin
manifest_version: 1
name: health_data_summary
version: 0.2.0
protocol: 2
entrypoint: run.sh
description: "Join Garmin + Withings DBs into a unified daily_health_summary row per dirty day. Delegates execution to the ductile-healthdata Docker image; this plugin is a thin wrapper that invokes `docker run --rm -i ductile-healthdata:latest`."
concurrency_safe: false

commands:
  - name: handle
    type: write
    description: "Event-dispatcher entry point. Routes by event.type: health.new_data triggers ETL of dirty_periods (Garmin or Withings) into healthdata.db. Emits healthdata.etl.completed."
    idempotent: true
    retry_safe: true
    values:
      consume:
        - payload.source
        - payload.dirty_periods
        - payload.detected_at
      emit:
        - event: healthdata.etl.completed
          values:
            - payload.source
            - payload.periods_processed
            - payload.metrics_written
            - payload.result

  - name: health
    type: read
    description: "Probe both source DBs and the summary.db; verify the healthdata Docker image is available. Emits no state_updates."
    idempotent: true
    retry_safe: true
    values:
      consume: []
      emit:
        - event: health_data_summary.health
          values:
            - payload.garmin_db
            - payload.withings_db
            - payload.summary_db
            - payload.image
            - payload.checked_at

fact_outputs:
  - when:
      command: handle
    from: state_updates
    fact_type: health_data_summary.snapshot
    compatibility_view: mirror_object

config_keys:
  required:
    - healthdata_db
    - garmin_summary_db
    - withings_db
  optional:
    - image
    - host_healthdata_dir
    - container_healthdata_dir
