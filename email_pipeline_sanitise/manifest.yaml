manifest_spec: ductile.plugin
manifest_version: 1
name: email_pipeline_sanitise
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Stage 2 of the ductile email pipeline. Thin sys_exec shim around the standalone Go sanitiser binary; consumes gmail.new_full_message events, pipes the raw Gmail Message JSON through the sanitiser, emits email.sanitised with the parsed Facts payload."
concurrency_safe: true
commands:
  - name: handle
    type: write
    description: "Sanitise a single Gmail Message resource. Reads event.payload.raw_message_json, pipes to sanitise binary, emits email.sanitised with the parsed facts.Facts payload."
    idempotent: true
    retry_safe: true
    values:
      consume:
        - payload.message_id
        - payload.raw_message_json
      emit:
        - event: email.sanitised
          values:
            - payload.message_id
            - payload.schema_version
            - payload.parts
            - payload.mime_summary
            - payload.attachments
            - payload.unicode_normalisation
  - name: health
    type: read
    description: "Verify sanitise binary is reachable and reports schema_version 0.1.0."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional:
    - sanitise_binary
    - expected_schema_version
