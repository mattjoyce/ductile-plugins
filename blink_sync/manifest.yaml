manifest_spec: ductile.plugin
manifest_version: 1
name: blink_sync
version: 0.1.0
protocol: 2
entrypoint: run.sh
description: "Download new motion clips from Blink local storage via Docker"
commands:
  - name: poll
    type: write
    description: "Spawn blink-sync container and download new clips to media dir."
    idempotent: false
    retry_safe: true
    values:
      consume: []
      emit: []
  - name: health
    type: read
    description: "Check that the blink-sync Docker image is present on the host."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional: [data_dir, media_dir, delay, image]
