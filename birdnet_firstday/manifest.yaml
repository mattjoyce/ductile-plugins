manifest_spec: ductile.plugin
manifest_version: 1
name: birdnet_firstday
version: 0.1.0
protocol: 2
entrypoint: run.py
concurrency_safe: false
description: "Polls birdnet-go SQLite detections DB and emits one event per species the first time it is detected each calendar day (local timezone). Common names resolved via birdnet-go range/species API."
commands:
  - name: poll
    type: write
    description: "Scan today's detections; emit an event per species whose first-of-day detection id exceeds the watermark."
    idempotent: false
    retry_safe: true
    values:
      consume: []
      emit:
        - event: birdnet.firstday_species
          values:
            - payload.source
            - payload.instance
            - payload.scientific_name
            - payload.common_name
            - payload.first_id
            - payload.first_ts
            - payload.first_time
            - payload.peak_conf
            - payload.peak_conf_pct
            - payload.detected_at
            - payload.message
  - name: health
    type: read
    description: "Report db reachability, today's detection count, watermark."
    idempotent: true
    retry_safe: true
fact_outputs:
  - when:
      command: poll
    from: state_updates
    fact_type: birdnet_firstday.snapshot
    compatibility_view: mirror_object
config_keys:
  required: [db_path]
  optional: [species_url, event_type, cache_ttl_seconds, http_timeout_seconds]
