manifest_spec: ductile.plugin
manifest_version: 1
name: jina-reader
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Scrapes web pages via Jina Reader API and returns clean markdown"
concurrency_safe: false
commands:
  - name: poll
    type: write
    description: "Fetch the configured URL and emit a content_changed event if content has changed."
    idempotent: false
    retry_safe: true
    values:
      consume: []
      emit:
        - event: content_changed
          values:
            - payload.url
            - payload.content
            - payload.content_hash
            - payload.truncated
  - name: handle
    type: write
    description: "Scrape content from a webpage and return clean markdown."
    idempotent: true
    retry_safe: true
    input_schema:
      url: string
    values:
      consume:
        - payload.url
      emit:
        - event: content_ready
          values:
            - payload.url
            - payload.content
            - payload.content_hash
            - payload.truncated
  - name: health
    type: read
    description: "Returns plugin health status."
    idempotent: true
    retry_safe: true
fact_outputs:
  - when:
      command: poll
    from: state_updates
    fact_type: jina-reader.snapshot
    compatibility_view: mirror_object
config_keys:
  required: []
  optional: [url, max_size, jina_api_key]
