manifest_spec: ductile.plugin
manifest_version: 1
name: changelog_microblog
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Generate micro-blog changelog entries from recent commits."
commands:
  - name: handle
    type: write
    description: "Use AI to generate and append a micro-blog entry to a git repository's CHANGELOG.md from provided content."
    idempotent: false
    retry_safe: true
    values:
      consume:
        - payload.repo_path
        - payload.path
        - payload.repo_name
        - payload.ssh_url
        - payload.clone_url
        - payload.default_branch
      emit:
        - event: changelog_microblog.completed
          values:
            - payload.repo_path
            - payload.repo_name
            - payload.changed
            - payload.entry_date
            - payload.entry_text
            - payload.since
            - payload.ssh_url
            - payload.clone_url
  - name: health
    type: read
    description: "Return health status."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional: [fabric_bin, fabric_pattern, patterns_path, author_name, author_email]
