manifest_spec: ductile.plugin
manifest_version: 1
name: git_commit_push
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Commit and push repo changes (README/CHANGELOG) with ductile author."
commands:
  - name: handle
    type: write
    description: "Stage, commit, and push changes to a configured git repository."
    idempotent: false
    retry_safe: true
    values:
      consume:
        - payload.repo_path
        - payload.path
        - payload.repo_name
        - payload.default_branch
        - payload.ssh_url
      emit:
        - event: git_commit_push.completed
          values:
            - payload.repo_path
            - payload.repo_name
            - payload.changed
            - payload.commit_sha
  - name: health
    type: read
    description: "Return health status."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional: [author_name, author_email, commit_message, prefer_ssh, ssh_alias_host]
