manifest_spec: ductile.plugin
manifest_version: 1
name: git_repo_sync
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Clone or fetch a single Git repository based on event payload."
commands:
  - name: handle
    type: write
    description: "Clone or fetch a single repository."
    idempotent: false
    retry_safe: true
    values:
      consume:
        - payload.owner
        - payload.repo_name
        - payload.clone_url
        - payload.ssh_url
        - payload.default_branch
        - payload.clone_dir
      emit:
        - event: git_repo_sync.completed
          values:
            - payload.message
            - payload.text
            - payload.result
            - payload.owner
            - payload.repo_name
            - payload.path
            - payload.action
            - payload.new_commits
            - payload.commit_count
            - payload.before_sha
            - payload.after_sha
            - payload.default_branch
            - payload.clone_url
            - payload.ssh_url
  - name: health
    type: read
    description: "Return health status."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional: [prefer_ssh, ssh_alias_host]
