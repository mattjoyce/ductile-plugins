manifest_spec: ductile.plugin
manifest_version: 1
name: repo_policy
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Ensure repos have README/CHANGELOG and a README changelog link."
commands:
  - name: handle
    type: write
    description: "Enforce standardised README and CHANGELOG structure in a git repository."
    idempotent: false
    retry_safe: true
    values:
      consume:
        - payload.path
        - payload.repo_path
        - payload.owner
        - payload.repo_name
        - payload.clone_dir
      emit:
        - event: repo_policy.completed
          values:
            - payload.repo_path
            - payload.repo_name
            - payload.changed
            - payload.files_changed
  - name: health
    type: read
    description: "Return health status."
    idempotent: true
    retry_safe: true
config_keys:
  required: []
  optional: [readme_heading, changelog_heading]
