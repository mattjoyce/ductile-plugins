manifest_spec: ductile.plugin
manifest_version: 1
name: youtube_playlist
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Poll a YouTube playlist feed and emit new video events."
concurrency_safe: false
commands:
  - name: poll
    type: write
    description: "Fetch playlist feed and emit new video events."
    idempotent: false
    retry_safe: true
    values:
      consume: []
      emit:
        - event: youtube.playlist_item
          values:
            - payload.video_id
            - payload.video_url
            - payload.url
            - payload.title
            - payload.published_at
            - payload.playlist_id
            - payload.playlist_url
            - payload.output_path
            - payload.prompt
            - payload.language
  - name: health
    type: read
    description: "Validate playlist configuration."
    idempotent: true
    retry_safe: true
fact_outputs:
  - when:
      command: poll
    from: state_updates
    fact_type: youtube_playlist.snapshot
    compatibility_view: mirror_object
config_keys:
  required: []
  optional:
    - playlist_id
    - playlist_url
    - output_dir
    - filename_template
    - prompt_template
    - max_entries
    - max_emit
    - emit_existing_on_first_run
    - transcript_language
    - user_agent
    - request_timeout_seconds
