manifest_spec: ductile.plugin
manifest_version: 1
name: sqlite_change
version: 0.1.0
protocol: 2
entrypoint: run.py
concurrency_safe: false
description: "Monitors a SQLite database via a SQL query; emits a configurable event when a threshold condition is met."
commands:
  - name: poll
    type: write
    description: "Run the configured query and emit event_type if threshold is met."
    idempotent: false
    retry_safe: true
    values:
      emit:
        - event: "<configured event_type>"
          values:
            - payload.source
            - payload.instance
            - payload.db_path
            - payload.query
            - payload.result
            - payload.previous_result
            - payload.threshold_op
            - payload.threshold_value
            - payload.detected_at
            - payload.message
  - name: health
    type: read
    description: "Return plugin health: db existence, current query result, state."
    idempotent: true
    retry_safe: true
config_keys:
  required: [db_path, query, event_type]
  optional: [threshold_op, threshold_value, message_template]
